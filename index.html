<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="styles/generics.css">
  <link rel="stylesheet" href="styles/styles.css">

</head>

<body>

  <article class="card">
    <img class="card__img" src="assets/images/illustration-article.svg" alt="Blog image ">

    <div class="main">
      <p class="card__learning">Learning</p>
      <time class="card__date" datetime="2023-12-21">
        Published 21 Dec 2023</time>
      <h1 class="card__title">HTML & CSS foundations</h1>
      <p class="card__text"> These languages are the backbone of every website, defining structure, content, and
        presentation.</p>
    </div>

    <div class="footer">
      <img class="card__avatar" src="assets/images/image-avatar.webp" alt="">
      <p class="card__author-name">Greg Hooper</p>
    </div>
  </article>

  <!--Created -->

</body>

</html>
